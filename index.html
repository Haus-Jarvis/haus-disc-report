<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Disc 사용 분석 리포트 | 2026.01–05</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<style>
:root{--navy:#0A2342;--navy2:#102b4e;--dark:#1F4E79;--mid:#2E75B6;--gold:#C8A456;--gold-lt:#E5C77E;
--ice:#D6E4F0;--sky:#BDD7EE;--mint:#7FB77E;--cream:#E8C872;--up:#2E9E5B;--up-bg:#E8F5E9;
--dn:#D64545;--dn-bg:#FCEBEA;--warn:#E8A33D;--warn-bg:#FDF4E3;--paper:#F4F6FA;--ink:#1A1A2E;
--muted:#6B7280;--line:#E5E8EE;--card:#FFFFFF}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard',sans-serif;background:var(--paper);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased}
.serif{font-family:'Fraunces',serif}
.top{background:linear-gradient(120deg,var(--navy),var(--navy2) 60%,var(--dark));color:#fff;padding:26px 5vw 0;position:sticky;top:0;z-index:100;box-shadow:0 6px 28px -10px rgba(10,35,66,.5)}
.top-inner{max-width:1320px;margin:0 auto}
.toprow{display:flex;justify-content:space-between;align-items:flex-start;gap:16px}
.brand{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.brand-mark{width:36px;height:36px;border:2px solid var(--gold);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-weight:900;font-size:19px;color:var(--gold)}
.brand-txt{font-size:12px;letter-spacing:.3em;font-weight:600;color:var(--gold-lt)}
.top h1{font-family:'Fraunces',serif;font-weight:900;font-size:clamp(23px,3.1vw,34px);line-height:1.1;margin-bottom:3px}
.top h1 em{font-style:italic;color:var(--gold-lt)}
.top .meta{font-size:13px;color:var(--ice);margin-bottom:16px}
.top .meta b{color:var(--gold-lt)}
.lang-tog{display:flex;background:rgba(255,255,255,.1);border-radius:9px;padding:3px;gap:2px;flex-shrink:0;margin-top:4px}
.lang-tog button{border:none;background:transparent;color:var(--ice);padding:6px 14px;border-radius:7px;font-family:'Pretendard';font-size:13px;font-weight:700;cursor:pointer;transition:all .2s}
.lang-tog button.active{background:var(--gold);color:var(--navy)}
.tabs{display:flex;gap:2px;flex-wrap:wrap}
.tabs button{background:rgba(255,255,255,.06);border:none;color:var(--ice);padding:13px 22px;font-family:'Pretendard';font-size:14px;font-weight:600;cursor:pointer;border-radius:10px 10px 0 0;transition:all .2s;border-bottom:3px solid transparent}
.tabs button:hover{background:rgba(255,255,255,.13)}
.tabs button.active{background:var(--paper);color:var(--navy);border-bottom:3px solid var(--gold)}
.tabs button .ico{margin-right:6px}
.wrap{max-width:1320px;margin:0 auto;padding:34px 5vw 70px}
.page{display:none;animation:fade .45s ease both}
.page.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.sec-head{display:flex;align-items:baseline;justify-content:space-between;margin:34px 0 18px;flex-wrap:wrap;gap:10px}
.sec-head:first-child{margin-top:4px}
.sec-title{font-family:'Fraunces',serif;font-weight:600;font-size:23px;color:var(--navy);display:flex;align-items:center;gap:11px}
.sec-title .n{font-size:12px;color:var(--gold);border:1.5px solid var(--gold);border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-family:'Pretendard';font-weight:700;flex-shrink:0}
.sec-desc{font-size:13px;color:var(--muted)}
.card{background:var(--card);border-radius:15px;border:1px solid var(--line);padding:24px;box-shadow:0 4px 20px -10px rgba(10,35,66,.12)}
.card h3{font-size:15.5px;font-weight:600;color:var(--navy);margin-bottom:3px;display:flex;align-items:center;gap:8px}
.card .hint{font-size:12.5px;color:var(--muted);margin-bottom:16px}
.grid2{display:grid;grid-template-columns:1.5fr 1fr;gap:18px}
.grid2b{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.chart-box{position:relative;height:360px}.chart-box.sm{height:280px}.chart-box.lg{height:420px}
.mtog{display:inline-flex;background:#EEF1F6;border-radius:9px;padding:3px;gap:2px;margin-bottom:14px;flex-wrap:wrap}
.mtog button{border:none;background:transparent;padding:6px 13px;border-radius:6px;font-family:'Pretendard';font-size:12.5px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .18s}
.mtog button.active{background:#fff;color:var(--navy);box-shadow:0 2px 7px -2px rgba(10,35,66,.25)}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:8px}
.kpi{background:var(--card);border-radius:15px;padding:22px 20px;border:1px solid var(--line);box-shadow:0 8px 28px -14px rgba(10,35,66,.22);position:relative;overflow:hidden}
.kpi-bar{position:absolute;top:0;left:0;width:100%;height:4px}
.kpi:nth-child(1) .kpi-bar{background:var(--dark)}.kpi:nth-child(2) .kpi-bar{background:var(--mid)}
.kpi:nth-child(3) .kpi-bar{background:var(--gold)}.kpi:nth-child(4) .kpi-bar{background:linear-gradient(90deg,var(--navy),var(--gold))}
.kpi-label{font-size:12px;color:var(--muted);font-weight:500}
.kpi-val{font-family:'Fraunces',serif;font-weight:900;font-size:38px;line-height:1;margin:8px 0 7px;color:var(--navy)}
.kpi-sub{display:inline-flex;align-items:center;gap:4px;font-size:12.5px;font-weight:600;padding:3px 9px;border-radius:18px}
.kpi-sub.dn{background:var(--dn-bg);color:var(--dn)}.kpi-sub.up{background:var(--up-bg);color:var(--up)}.kpi-sub.neutral{background:#EEF1F6;color:var(--muted)}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th,td{padding:8px 9px;text-align:center;border-bottom:1px solid var(--line)}
th{background:var(--navy);color:#fff;font-weight:600;font-size:11.5px}
th.grp{background:var(--dark)}
td:first-child,th:first-child{text-align:left;font-weight:600}
tbody tr:hover{background:#F2F6FB}
.tbl-wrap{max-height:480px;overflow:auto;border-radius:12px;border:1px solid var(--line)}
.row-prod{background:#F2F9F0}.row-sale{background:#FDFAF0}.row-mon{background:var(--sky);font-weight:700}
/* === 틀고정(freeze) === */
#haTbl{border-collapse:separate;border-spacing:0}
#haTbl thead th{position:sticky;top:0;z-index:5}
#haTbl th:nth-child(1),#haTbl td:nth-child(1){position:sticky;left:0;z-index:3;width:84px;min-width:84px;max-width:84px;font-size:11.5px}
#haTbl th:nth-child(2),#haTbl td:nth-child(2){position:sticky;left:84px;z-index:3;width:60px;min-width:60px;max-width:60px}
#haTbl thead th:nth-child(1),#haTbl thead th:nth-child(2){z-index:6}
#haTbl tr.row-mon td:nth-child(1),#haTbl tr.row-mon td:nth-child(2){background:var(--sky)}
#haTbl tr.row-prod td:nth-child(1),#haTbl tr.row-prod td:nth-child(2){background:#F2F9F0}
#haTbl tr.row-sale td:nth-child(1),#haTbl tr.row-sale td:nth-child(2){background:#FDFAF0}
#obTbl{border-collapse:separate;border-spacing:0}
#obTbl thead th{position:sticky;top:0;z-index:5}
#obTbl th:nth-child(1),#obTbl td:nth-child(1){position:sticky;left:0;z-index:3;width:108px;min-width:108px;max-width:108px;background:#fff}
#obTbl thead th:nth-child(1){z-index:6}
#obTbl tr.row-tot td:nth-child(1){background:#ECEFF4}
#obTbl2{border-collapse:separate;border-spacing:0}
#obTbl2 thead th{position:sticky;top:0;z-index:5}
#obTbl2 th:nth-child(1),#obTbl2 td:nth-child(1){position:sticky;left:0;z-index:3;width:120px;min-width:120px;max-width:120px;background:#fff}
#obTbl2 thead th:nth-child(1){z-index:6}
#obTbl2 tr.row-tot td:nth-child(1){background:#FDFAF0}
.row-tot{background:#ECEFF4;font-weight:700}
.up{color:var(--up);font-weight:700}.dn{color:var(--dn);font-weight:700}
.chip{display:inline-block;padding:1px 7px;border-radius:10px;font-size:11px;font-weight:600}
.chip.ha{background:var(--ice);color:var(--dark)}.chip.aidite{background:#E3F0FB;color:#1a6bb5}.chip.haus{background:#E9F6E8;color:#2e7d32}
.sig-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:13px}
.sig{border-radius:13px;padding:17px;border:1px solid var(--line);position:relative}
.sig.up{background:linear-gradient(135deg,#F2FBF4,#fff)}.sig.dn{background:linear-gradient(135deg,#FEF3F2,#fff)}
.sig .arr{font-size:19px;font-weight:700}.sig.up .arr{color:var(--up)}.sig.dn .arr{color:var(--dn)}
.sig-name{font-size:14.5px;font-weight:700;color:var(--navy);margin:3px 0}
.sig-mom{font-size:21px;font-family:'Fraunces',serif;font-weight:900;margin:5px 0 2px}
.sig.up .sig-mom{color:var(--up)}.sig.dn .sig-mom{color:var(--dn)}
.sig-avg{font-size:12px;color:var(--muted);font-weight:500}
.recon-banner{background:linear-gradient(120deg,#FDF4E3,#fff);border:1.5px solid var(--warn);border-radius:15px;padding:22px 26px;margin-bottom:22px;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.recon-banner .big{font-family:'Fraunces',serif;font-weight:900;font-size:42px;color:var(--dn)}
.recon-banner .txt{flex:1;min-width:240px}
.recon-banner .txt h4{font-size:17px;color:var(--navy);margin-bottom:4px;font-weight:600}
.recon-banner .txt p{font-size:13px;color:var(--muted)}
.recon-tbl td,.recon-tbl th{padding:11px 10px}
.match-n{background:var(--dn-bg);color:var(--dn);font-weight:700;border-radius:6px;padding:2px 10px;font-size:12px}
.diff-pos{color:var(--up);font-weight:700}.diff-neg{color:var(--dn);font-weight:700}
.diff-cell{font-family:'Fraunces',serif;font-weight:900;font-size:16px}
.note{background:#F8FAFC;border-left:3px solid var(--gold);padding:13px 17px;border-radius:0 9px 9px 0;font-size:13px;color:var(--muted);margin-top:14px}
.note b{color:var(--navy)}
.footer{background:var(--navy);color:var(--ice);padding:26px 5vw;text-align:center;font-size:12.5px;margin-top:46px}
.footer b{color:var(--gold-lt)}
@media(max-width:900px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.grid2,.grid2b{grid-template-columns:1fr}.toprow{flex-direction:column}}
</style>
</head>
<body>
<div class="top"><div class="top-inner">
  <div class="toprow">
    <div>
      <div class="brand"><div class="brand-mark">H</div><div class="brand-txt" data-i="brand">HAUS MILLING CENTER</div></div>
      <h1><span data-i="title_a">Disc</span> <em data-i="title_em">사용 분석</em> <span data-i="title_b">리포트</span></h1>
      <div class="meta" data-ih="meta"></div>
    </div>
    <div class="lang-tog"><button data-lang="ko">한국어</button><button class="active" data-lang="en">EN</button></div>
  </div>
  <div class="tabs">
    <button class="active" data-tab="ov"><span class="ico">📊</span><span data-i="tab_ov">개요</span></button>
    <button data-tab="ha"><span class="ico">🟦</span><span data-i="tab_ha">Haus/Aidite</span></button>
    <button data-tab="ob"><span class="ico">🟨</span><span data-i="tab_ob">Other Blocks</span></button>
    <button data-tab="ch"><span class="ico">🛒</span><span data-i="tab_ch">채널 판매</span></button>
    <button data-tab="rc"><span class="ico">🔗</span><span data-i="tab_rc">Haus Link 검증</span></button>
  </div>
</div></div>
<div class="wrap">

<div class="page active" id="ov">
  <div class="kpi-grid">
    <div class="kpi"><div class="kpi-bar"></div><div class="kpi-label" data-i="kpi1"></div><div class="kpi-val" id="k1">0</div><div class="kpi-sub dn" data-i="kpi1s"></div></div>
    <div class="kpi"><div class="kpi-bar"></div><div class="kpi-label" data-i="kpi2"></div><div class="kpi-val" id="k2">0</div><div class="kpi-sub dn" data-i="kpi2s"></div></div>
    <div class="kpi"><div class="kpi-bar"></div><div class="kpi-label" data-i="kpi3"></div><div class="kpi-val" id="k3">0</div><div class="kpi-sub dn" data-i="kpi3s"></div></div>
    <div class="kpi"><div class="kpi-bar"></div><div class="kpi-label" data-i="kpi4"></div><div class="kpi-val" id="k4">0</div><div class="kpi-sub neutral" data-i="kpi4s"></div></div>
  </div>
  <div class="sec-head"><div class="sec-title"><span class="n">1</span><span data-i="ov_s1"></span></div><div class="sec-desc" data-i="ov_s1d"></div></div>
  <div class="grid2">
    <div class="card"><h3 data-i="ov_c1"></h3><div class="hint" data-i="ov_c1h"></div><div class="chart-box"><canvas id="trendChart"></canvas></div></div>
    <div class="card"><h3 data-i="ov_c2"></h3><div class="hint" data-i="ov_c2h"></div><div class="chart-box"><canvas id="psChart"></canvas></div></div>
  </div>
  <div class="sec-head"><div class="sec-title"><span class="n">2</span><span data-i="ov_s2"></span></div><div class="sec-desc" data-i="ov_s2d"></div></div>
  <div class="grid2b">
    <div class="card"><h3 data-i="ov_c3"></h3><div class="hint" data-i="ov_c3h"></div><div class="chart-box sm"><canvas id="stackChart"></canvas></div></div>
    <div class="card"><h3 data-i="ov_c4"></h3><div class="hint" data-i="ov_c4h"></div><div class="chart-box sm"><canvas id="donutChart"></canvas></div></div>
  </div>
</div>

<div class="page" id="ha">
  <div class="sec-head"><div class="sec-title"><span class="n">1</span><span data-i="ha_s1"></span></div><div class="sec-desc" data-i="ha_s1d"></div></div>
  <div class="grid2">
    <div class="card"><h3 data-i="ha_c1"></h3><div class="hint" data-i="ha_c1h"></div>
      <div class="mtog" id="haMtog"><button class="active" data-m="all"></button><button data-m="1"></button><button data-m="2"></button><button data-m="3"></button><button data-m="4"></button><button data-m="5"></button></div>
      <div class="chart-box"><canvas id="haStack"></canvas></div></div>
    <div class="card"><h3 id="haRankTitle"></h3><div class="hint" data-i="ha_c2h"></div><div class="chart-box"><canvas id="haRank"></canvas></div></div>
  </div>
  <div class="sec-head"><div class="sec-title"><span class="n">2</span><span data-i="ha_s2"></span></div><div class="sec-desc" data-i="ha_s2d"></div></div>
  <div class="sig-grid" id="haSig"></div>
  <div class="sec-head"><div class="sec-title"><span class="n">3</span><span data-i="ha_s3"></span></div></div>
  <div class="card" style="padding:0;overflow:hidden"><div class="tbl-wrap"><table id="haTbl"></table></div></div>
</div>

<div class="page" id="ob">
  <div class="sec-head"><div class="sec-title"><span class="n">1</span><span data-i="ob_s1"></span></div><div class="sec-desc" data-i="ob_s1d"></div></div>
  <div class="grid2">
    <div class="card"><h3 data-i="ob_c1"></h3><div class="hint" data-i="ob_c1h"></div><div class="chart-box"><canvas id="obTrend"></canvas></div></div>
    <div class="card"><h3 data-i="ob_c2"></h3><div class="hint" data-i="ob_c2h"></div><div class="chart-box"><canvas id="obDonut"></canvas></div></div>
  </div>
  <div class="sec-head"><div class="sec-title"><span class="n">2</span><span data-i="ob_s2"></span></div></div>
  <div class="card"><h3 data-i="ob_c3"></h3><div class="hint" data-i="ob_c3h"></div>
    <div class="mtog" id="obMtog"><button class="active" data-m="all"></button><button data-m="1"></button><button data-m="2"></button><button data-m="3"></button><button data-m="4"></button><button data-m="5"></button></div>
    <div class="chart-box lg"><canvas id="obStack"></canvas></div></div>
  <div class="sec-head"><div class="sec-title"><span class="n">3</span><span data-i="ob_s3"></span></div></div>
  <div class="card" style="padding:0;overflow:hidden"><div class="tbl-wrap"><table id="obTbl"></table></div></div>
  <div class="note" data-ih="ob_note"></div>
  <div class="sec-head"><div class="sec-title"><span class="n">4</span><span data-i="ob_s4"></span></div><div class="sec-desc" data-i="ob_s4d"></div></div>
  <div class="card" style="padding:0;overflow:hidden"><div class="tbl-wrap"><table id="obTbl2"></table></div></div>
</div>

<div class="page" id="ch">
  <div class="sec-head"><div class="sec-title"><span class="n">1</span><span data-i="ch_s1"></span></div><div class="sec-desc" data-i="ch_s1d"></div></div>
  <div class="grid2">
    <div class="card"><h3 data-i="ch_c1"></h3><div class="hint" data-i="ch_c1h"></div><div class="chart-box"><canvas id="chChart"></canvas></div></div>
    <div class="card"><h3 data-i="ch_c2"></h3><div class="hint" data-i="ch_c2h"></div><div class="chart-box"><canvas id="chDonut"></canvas></div></div>
  </div>
  <div class="sec-head"><div class="sec-title"><span class="n">2</span><span data-i="ch_s2"></span></div></div>
  <div class="card" style="padding:0;overflow:hidden"><table id="chTbl"></table></div>
  <div class="grid2b" style="margin-top:18px">
    <div class="card" style="padding:0;overflow:hidden"><div style="padding:18px 24px 4px"><h3 data-i="ch_shop"></h3><div class="hint" data-i="ch_shoph"></div></div><div class="tbl-wrap" style="border:none"><table id="shopTbl"></table></div></div>
    <div class="card" style="padding:0;overflow:hidden"><div style="padding:18px 24px 4px"><h3 data-i="ch_ev"></h3><div class="hint" data-i="ch_evh"></div></div><div class="tbl-wrap" style="border:none"><table id="evTbl"></table></div></div>
  </div>
</div>

<div class="page" id="rc">
  <div class="sec-head"><div class="sec-title"><span class="n">★</span><span data-i="rc_s1"></span></div><div class="sec-desc" data-i="rc_s1d"></div></div>
  <div class="recon-banner"><div class="big" style="color:var(--up)">+15</div><div class="txt"><h4 data-ih="rc_bh"></h4><p data-ih="rc_bp"></p></div></div>
  <div class="grid2">
    <div class="card"><h3 data-i="rc_c1"></h3><div class="hint" data-i="rc_c1h"></div><div class="chart-box"><canvas id="rcChart"></canvas></div></div>
    <div class="card"><h3 data-i="rc_c2"></h3><div class="hint" data-i="rc_c2h"></div><div class="chart-box"><canvas id="rcCompare"></canvas></div></div>
  </div>
  <div class="sec-head"><div class="sec-title"><span class="n">2</span><span data-i="rc_s2"></span></div></div>
  <div class="card" style="padding:0;overflow:hidden"><table class="recon-tbl" id="rcTbl"></table></div>
  <div class="note" data-ih="rc_note"></div>
</div>

</div>
